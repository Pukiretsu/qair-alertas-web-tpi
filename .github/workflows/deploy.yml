name: Deploy QAIR SPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_project_name: qair
  TF_VAR_environment: prod
  TF_VAR_bucket_name: ${{ vars.QAIR_SPA_BUCKET_NAME }}

jobs:
  deploy:
    name: Build, provision and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_PUBLIC_DOCS_BASE_URL: ${{ vars.VITE_PUBLIC_DOCS_BASE_URL }}
          VITE_GITHUB_REPOSITORY_URL: ${{ vars.VITE_GITHUB_REPOSITORY_URL }}
          VITE_COMMENTS_API_URL: ${{ vars.VITE_COMMENTS_API_URL }}
          VITE_CALENDLY_URL: ${{ vars.VITE_CALENDLY_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Terraform format check
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: infra/terraform
        run: |
          echo "bucket=$(terraform output -raw website_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Upload static assets to S3
        run: |
          aws s3 sync dist "s3://${{ steps.tf_outputs.outputs.bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html "s3://${{ steps.tf_outputs.outputs.bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf_outputs.outputs.distribution_id }}" \
            --paths "/*"
